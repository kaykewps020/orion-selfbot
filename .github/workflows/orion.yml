name: Orion Selfbot 247

on:
  workflow_dispatch:
    inputs:
      token:
        description: Token do Discord
        required: true
        type: string
      custom_status:
        description: Status personalizado
        required: false
        type: string
        default: 'Orion v2 | /help'
  schedule:
    - cron: '0 */5 * * *'
  push:
    branches: [ main ]

concurrency:
  group: orion-selfbot
  cancel-in-progress: true

env:
  DISCORD_TOKEN: ${{ inputs.token || secrets.DISCORD_TOKEN || '' }}
  STATUS_TEXT: ${{ inputs.custom_status || 'Orion v2 | /help' }}

jobs:
  run-orion:
    name: Orion Selfbot Runner
    runs-on: ubuntu-latest
    timeout-minutes: 330

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install deps
        run: |
          npm install
          pip3 install --quiet scapy 2>/dev/null || true

      - name: Configure token
        run: |
          if [ -z "$DISCORD_TOKEN" ]; then
            echo "Token nao definido!"
            exit 1
          fi
          node -e "
            const fs = require('fs');
            const cfg = JSON.parse(fs.readFileSync('config.json', 'utf8'));
            cfg.token = '$DISCORD_TOKEN';
            cfg.status_text = '$STATUS_TEXT';
            fs.writeFileSync('config.json', JSON.stringify(cfg, null, 2));
            console.log('Token configurado');
          "

      - name: Create spam file
        run: |
          mkdir -p storage/downloads
          python3 -c "
import os
# Gerar o mesmo padrao do text.txt original
lines = []
# Linha 1: cabecalho
lines.append('@everyone @here raided by setsociety')
# Linhas 2-656: blocos de caracteres invisivel
invisible = '\u3164\u3164\u3164\u3164\u3164\u3164\u3164\u3164\u3164\u3164'
for i in range(650):
    lines.append(invisible)
# Separador
lines.append('- OUTRA MENSAGEM:')
# Bloco cuneiforme massivo
cuneiform_block = '\U0001012B' * 200 + ' @everyone @here'
for i in range(10):
    lines.append(cuneiform_block)
# Bloco final
lines.append('@everyone @here ORION RAIDS')
with open('storage/downloads/text.txt', 'w', encoding='utf-8') as f:
    f.write('\n'.join(lines))
print(f'Arquivo criado: {os.path.getsize(\"storage/downloads/text.txt\")} bytes')
"

      - name: Start Orion
        run: |
          echo "Iniciando Orion Selfbot..."
          node orion.js &
          BOT_PID=$!
          echo "PID: $BOT_PID"
          END_TIME=$(( $(date +%s) + 330 * 60 ))
          while [ $(date +%s) -lt $END_TIME ]; do
            if ! kill -0 $BOT_PID 2>/dev/null; then
              echo "Bot morreu, reiniciando..."
              node orion.js &
              BOT_PID=$!
              echo "Novo PID: $BOT_PID"
            fi
            sleep 30
          done
          kill $BOT_PID 2>/dev/null
          echo "5.5 horas. Reiniciando..."
        shell: bash
        timeout-minutes: 331

      - name: Summary
        if: always()
        run: |
          echo "Status: ${{ job.status }}"
          echo "Run: ${{ github.run_id }}"
