name: Orion 247

on:
  workflow_dispatch:
    inputs:
      token:
        description: token
        required: true

env:
  TOKEN: ${{ inputs.token || secrets.TOKEN || '' }}

jobs:
  run:
    runs-on: ubuntu-latest
    timeout-minutes: 330
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - run: npm install

      - name: cfg
        run: node -e "const fs=require('fs');const c=JSON.parse(fs.readFileSync('config.json','utf8'));c.token=process.env.TOKEN;fs.writeFileSync('config.json',JSON.stringify(c,null,2))"

      - name: spam
        run: node .github/workflows/gen.js

      - name: start
        run: |
          node orion.js &
          PID=$!
          END=$(( $(date +%s) + 330*60 ))
          while [ $(date +%s) -lt $END ]; do
            if ! kill -0 $PID 2>/dev/null; then
              node orion.js &
              PID=$!
            fi
            sleep 30
          done
          kill $PID 2>/dev/null
        shell: bash
        timeout-minutes: 331
